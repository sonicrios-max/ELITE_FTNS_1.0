services:
  - type: web
    name: elite-fitness-coaching
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port 8080
    envVars:
      - key: PERSISTENT_DIR
        value: /data
      - key: PORT
        value: 8080
    disk:
      name: fitness-data
      mountPath: /data
      sizeGB: 1
